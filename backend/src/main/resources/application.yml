spring:
  application:
    name: analytics-dashboard

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/analytics_db}
    username: ${DB_USER:sriman}
    password: ${DB_PASS:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 5000ms

  cache:
    type: none
    redis:
      time-to-live: 300000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyThatShouldBeChangedInProductionAndMustBe256BitsLong12345}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

logging:
  level:
    com.analytics: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

